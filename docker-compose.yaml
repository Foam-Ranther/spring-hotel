services:
  nginx:
    image: nginx:latest
    container_name: nginx-loadbalancer

    ports:
      - "3000:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - server

    networks:
      - backend

  server:
    build: .

    depends_on:
      - mongo
    networks:
      - backend
    deploy:
      replicas: 5

  mongo:
    image: mongo:7
    container_name: mongodb

    environment:
      MONGO_INITDB_DATABASE: appdb
    volumes:
      - mongo_data:/data/db

    networks:
      - backend

volumes:
  mongo_data:

networks:
  backend:

