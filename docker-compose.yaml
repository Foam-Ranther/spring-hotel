services:
  nginx:
    image: nginx:latest
    container_name: nginx-loadbalancer

    ports:
      - "3000:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - server

    networks:
      - backend

  server:
    build: .
    depends_on:
      - mongo
    networks:
      - backend
    environment:
      MONGO_URL: mongodb://mongo:27017/spring-hotel
    deploy:
      replicas: 3

  mongo:
    image: mongo:7
    container_name: mongodb

    environment:
      MONGO_INITDB_DATABASE: appdb

    expose:
      - "3000"


    volumes:
      - mongo_data:/data/db

    networks:
      - backend

volumes:
  mongo_data:

networks:
  backend: